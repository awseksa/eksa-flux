######## CNF TEMPLATE DEFINITIONS ###########
nf:
  version: "23.3.1-p5"
  vendorId: "mvnr"
  mtcilId: "mtcil1" #do not edit
  nfClass: "mgmt"
  nfType: "mtcil"
  nfId: "mtcil1"
  
  cnftpl_configmap:
    mgmt_cfg:
      create: true
      metaspec: 
        annotations:
          configMgmt: enabled
    static_cfg: 
      create: true
      metaspec: {}
    env_cfg:
      create: false
      metaspec: {}
  cnftpl_secret:
      create: false
      metaspec: {}
      secretspec: {}
  cnftpl_namespaces:
      create: false
      metaspec: {}
  cnftpl_dashboard:
      create: false
      metaspec: {}
  cnftpl_eventdef:
      create: true
      metaspec: {}
  cnftpl_alertsdef:
      create: false
      metaspec: {}
  cnftpl_metricsdef:
      create: false
      metaspec: {}

app_name_prefix: ""
###########################################
serviceAccount: tmaas-account
hub: 10.1.1.1:5000

pollFrequency: 30
resyncPeriod: 5
kafka_max_poll: 100
#jvm_options: "-Xmx500m"
nfUpgradeCheckEnabled: "true"
nfUpgradeTimeout: "600"
metricsBasicLevel: "true"
kafkaReconnectCount: 300
jvm_options: "-XX:MaxRAMPercentage=60.0 -XX:+HeapDumpOnOutOfMemoryError -XX:HeapDumpPath=/opt/logs/tmaas-mtcil-hdump.hprof"

tmaas:
  init_container:
    image:
      repository: mtcil-svc-init
      tag: 21.2.2

componentSpec:
  service_fend:
    metaspec_tmaas: {
      "name" : "tmaas"
    }
    metaspec_topoengine: {
      "name": "topo-engine"
    }
    metaspec_topogw: {
      "name": "topo-gw"
    }
    ports:
      port: "8080"
      targetPort: "8080"
    https:
      targetPort: "8443"
      port: "8443"
    type: NodePort

  deployment:
    replicas: 1
    
    pod_metaspec:
      labels:
        app: tmaas
      annotations:
        mtcil.com/me: '{"locationName":"bangalore-1","swVersion":"v1.0","managedBy":{"mns.address.primary":"IP=mns@primary","mns.address.secondary":"IP=mns@secondary"}}'
        prometheus.io/scrape: "true"
        prometheus.io/path: /metrics
        prometheus.io/port: "8000"
        
    tmaas:
      image: tmaas
      tag: 23.3.1-p5
      enableWebhookCreation: "false"
      operations:
        running_operation_nf: "20"
        pending_operation_nf: "20"
        pending_timeout: "300"
        running_timeout: "600"
        completed_timeout: "900"
      resource:
        limit_memory: 750Mi
        limit_cpu: 500m
        request_memory: 750Mi
        request_cpu: 500m

    cim:
      image: cim
      tag: 21.2.2
      resource:
        limit_memory: 200Mi
        limit_cpu: 100m
        request_memory: 100Mi
        request_cpu: 50m
      mount:
        type: Directory
        container_path: /opt/logs
        host_path: /data/logs

scaling:
  enabled: true
  max_replicas: 2
  min_replicas: 1
  target_cpu_percentage: 70
  target_memory_percentage: 90

etcd_svc_fqdn: "etcd.mvnr-mtcil1-infra-mtcil-mtcil1:2379"
kafka_svc_fqdn: "kafka-svc.mvnr-mtcil1-infra-mtcil-mtcil1:9092"
k8s_svc_fqdn: "kubernetes.default"
zk_svc_fqdn: "zk-0.zk.mvnr-mtcil1-infra-mtcil-mtcil1:2181,zk-1.zk.mvnr-mtcil1-infra-mtcil-mtcil1:2181,zk-2.zk.mvnr-mtcil1-infra-mtcil-mtcil1:2181"

podConfig:

affinity:
  nodeAffinity: {}
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
    - weight: 100
      podAffinityTerm:
        labelSelector:
          matchExpressions:
          - key: component
            operator: In
            values:
            - "tmaas"
        topologyKey: kubernetes.io/hostname
