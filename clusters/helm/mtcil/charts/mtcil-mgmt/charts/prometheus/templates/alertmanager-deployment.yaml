{{- if and .Values.global.mtcil.enableServiceprovisioning .Values.global.mtcil.enableMandatoryServices }}
{{- if and .Values.alertmanager.enabled (not .Values.alertmanager.statefulSet.enabled) -}}
{{- $cnfHdr := (dict "" "") -}}
{{- include "cnfTplHeader_2_27" (dict "cnfHdr" $cnfHdr "dot" . ) -}}
apiVersion: {{ template "prometheus.deployment.apiVersion" . }}
kind: Deployment
metadata:
  annotations:
    {{- if .Values.alertmanager.app_name_prefix }}
    {{ template "promethues.metadata.annotatetmaasspec" (dict "specOffset" 4 "cnfHdr" $cnfHdr "nfService" .Values.alertmanager.app_name_prefix ) }}
    {{- else }}
    {{ template "promethues.metadata.annotatetmaasspec" (dict "specOffset" 4 "cnfHdr" $cnfHdr "nfService" (include "prometheus.alertmanager.fullname" .) ) }}
    {{- end }}
  {{- $custom_extensions := .Values.global.custom_extensions | default dict -}}
  {{- $pod_metaspec := .Values.alertmanager.componentSpec | default dict -}}
  {{- if $custom_extensions.annotations -}}
  {{- range $key, $value := .Values.global.custom_extensions.annotations }}
    {{ $key }}: {{ $value | quote }}
  {{- end }}
  {{- end }}
  labels:
    {{- include "prometheus.alertmanager.labels" . | nindent 4 }}
  {{- if $custom_extensions.labels -}}
  {{- range $key, $value := .Values.global.custom_extensions.labels }}
    {{ $key }}: {{ $value | quote }}
  {{- end }}
  {{- end }}
  {{- if .Values.alertmanager.app_name_prefix }}
  name: {{ .Values.alertmanager.app_name_prefix }}
  {{- else }}
  name: {{ template "prometheus.alertmanager.fullname" . }}
  {{- end }}
  namespace: {{ $cnfHdr.nfVariables.nfPrefix }}
spec:
  selector:
    matchLabels:
      {{- include "prometheus.alertmanager.matchLabels" . | nindent 6 }}
  replicas: {{ .Values.alertmanager.replicaCount }}
  {{- if .Values.alertmanager.strategy }}
  strategy:
{{ toYaml .Values.alertmanager.strategy | trim | indent 4 }}
    {{ if eq .Values.alertmanager.strategy.type "Recreate" }}rollingUpdate: null{{ end }}
{{- end }}
  template:
    metadata:
      annotations:
        {{- if .Values.alertmanager.app_name_prefix }}
        {{ template "promethues.metadata.annotatetmaasspec" (dict "specOffset" 8 "cnfHdr" $cnfHdr "nfService" .Values.alertmanager.app_name_prefix ) }}
        {{- else }}
        {{ template "promethues.metadata.annotatetmaasspec" (dict "specOffset" 8 "cnfHdr" $cnfHdr "nfService" (include "prometheus.alertmanager.fullname" .) ) }}
        {{- end }}
    {{- if .Values.alertmanager.podAnnotations }}
{{ toYaml .Values.alertmanager.podAnnotations | indent 8 }}
    {{- end }}
      {{- if $custom_extensions.annotations -}}
      {{- range $key, $value := .Values.global.custom_extensions.annotations }}
        {{ $key }}: {{ $value | quote }}
      {{- end }}
      {{- end }}
      labels:
        {{- include "prometheus.alertmanager.labels" . | nindent 8 }}
        {{- if .Values.alertmanager.podLabels}}
        {{ toYaml .Values.alertmanager.podLabels | nindent 8 }}
        {{- end}}
  {{- if $custom_extensions.labels -}}
  {{- range $key, $value := .Values.global.custom_extensions.labels }}
        {{ $key }}: {{ $value | quote }}
  {{- end }}
  {{- end }}
  {{- if $pod_metaspec.deployment -}}
  {{- range $key, $value := $pod_metaspec.deployment.pod_metaspec.labels }}
        {{ $key }}: {{ $value | quote }}
  {{- end }}
  {{- end }}
    spec:
{{- if .Values.alertmanager.schedulerName }}
      schedulerName: "{{ .Values.alertmanager.schedulerName }}"
{{- end }}
{{- if  .Values.alertmanager.podConfig }}
{{ toYaml .Values.alertmanager.podConfig | indent 6 }}
{{- end }}
{{- if .Values.global.mtcil.podConfig }}
{{ toYaml .Values.global.mtcil.podConfig | indent 6 }}
{{- end }}

{{- if  .Values.alertmanager.affinity }}
      affinity:
{{ toYaml .Values.alertmanager.affinity | indent 8 }}
{{- end }}
      serviceAccountName: mtcil-sa
      {{- if .Values.alertmanager.extraInitContainers }}
      initContainers:
{{ toYaml .Values.alertmanager.extraInitContainers | indent 8 }}
      {{- end }}
{{- if .Values.alertmanager.priorityClassName }}
      priorityClassName: "{{ .Values.alertmanager.priorityClassName }}"
{{- end }}
      containers:
        - name: {{ template "prometheus.name" . }}-{{ .Values.alertmanager.name }}
          image: "{{ .Values.global.hub }}/{{ .Values.alertmanager.name }}:{{ .Values.alertmanager.image.tag }}"
          imagePullPolicy: "{{ .Values.global.mtcil.imagePullPolicy }}"
{{- if  .Values.containerConfig }}
{{ toYaml .Values.containerConfig | indent 10 }}
{{- else if .Values.global.mtcil.containerConfig }}
{{ toYaml .Values.global.mtcil.containerConfig | indent 10 }}
{{- end }}
          env:
            - name: TZ
              value: {{ .Values.global.timezone | quote }}
            {{- range $key, $value := .Values.alertmanager.extraEnv }}
            - name: {{ $key }}
              value: {{ $value }}
            {{- end }}
            - name: POD_IP
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: status.podIP
          args:
            - --config.file=/etc/config/{{ .Values.alertmanager.configFileName }}
            - --storage.path={{ .Values.alertmanager.persistentVolume.mountPath }}
          {{- if .Values.alertmanager.enableipv6 }}
            - --cluster.advertise-address=[$(POD_IP)]:6783
          {{- else }}
            - --cluster.advertise-address=$(POD_IP):6783
          {{- end }}
          {{- range $key, $value := .Values.alertmanager.extraArgs }}
            - --{{ $key }}={{ $value }}
          {{- end }}
          {{- if .Values.alertmanager.baseURL }}
            - --web.external-url={{ .Values.alertmanager.baseURL }}
          {{- end }}

          ports:
            - containerPort: 9093
          readinessProbe:
            httpGet:
              path: {{ .Values.alertmanager.prefixURL }}/-/ready
              port: 9093
            initialDelaySeconds: 30
            timeoutSeconds: 30
          resources:
{{ toYaml .Values.alertmanager.resources | indent 12 }}
          volumeMounts:
            - name: config-volume
              mountPath: /etc/config
            - name: storage-volume
              mountPath: "{{ .Values.alertmanager.persistentVolume.mountPath }}"
              subPath: "{{ .Values.alertmanager.persistentVolume.subPath }}"
          {{- range .Values.alertmanager.extraSecretMounts }}
            - name: {{ .name }}
              mountPath: {{ .mountPath }}
              subPath: {{ .subPath }}
              readOnly: {{ .readOnly }}
          {{- end }}

        {{- if .Values.configmapReload.alertmanager.enabled }}
        - name: {{ template "prometheus.name" . }}-{{ .Values.alertmanager.name }}-{{ .Values.configmapReload.alertmanager.name }}
          image: "{{ .Values.global.hub }}/{{ .Values.configmapReload.alertmanager.name }}:{{ .Values.configmapReload.alertmanager.image.tag }}"
          imagePullPolicy: "{{ .Values.global.mtcil.imagePullPolicy }}"
{{- if  .Values.containerConfig }}
{{ toYaml .Values.containerConfig | indent 10 }}
{{- else if .Values.global.mtcil.containerConfig }}
{{ toYaml .Values.global.mtcil.containerConfig | indent 10 }}
{{- end }}
          args:
            - --volume-dir=/etc/config
            - --webhook-url=http://127.0.0.1:9093{{ .Values.alertmanager.prefixURL }}/-/reload
          resources:
{{ toYaml .Values.configmapReload.alertmanager.resources | indent 12 }}
          volumeMounts:
            - name: config-volume
              mountPath: /etc/config
              readOnly: true
        {{- end }}
    {{- if .Values.imagePullSecrets }}
      imagePullSecrets:
      {{ toYaml .Values.imagePullSecrets | indent 2 }}
    {{- end }}
    {{- if and (.Values.global) (.Values.global.mtcil) (.Values.global.mtcil.mgmtNodeSelector) (.Values.global.mtcil.mgmtNodeSelector.enabled) }}
      nodeSelector:
        {{ .Values.global.mtcil.mgmtNodeSelector.labelKey }}: {{ .Values.global.mtcil.mgmtNodeSelector.labelValue | quote }}
    {{- end }}
    {{- if .Values.alertmanager.tolerations }}
      tolerations:
{{ toYaml .Values.alertmanager.tolerations | indent 8 }}
    {{- end }}
      volumes:
        - name: config-volume
          {{- if empty .Values.alertmanager.configFromSecret }}
          configMap:
            name: {{ if .Values.alertmanager.configMapOverrideName }}{{ .Release.Name }}-{{ .Values.alertmanager.configMapOverrideName }}{{- else }}{{ template "prometheus.alertmanager.fullname" . }}{{- end }}
          {{- else }}
          secret:
            secretName: {{ .Values.alertmanager.configFromSecret }}
          {{- end }}
      {{- range .Values.alertmanager.extraSecretMounts }}
        - name: {{ .name }}
          secret:
            secretName: {{ .secretName }}
      {{- end }}
        - name: storage-volume
        {{- if .Values.alertmanager.persistentVolume.enabled }}
          persistentVolumeClaim:
            claimName: {{ if .Values.alertmanager.persistentVolume.existingClaim }}{{ .Values.alertmanager.persistentVolume.existingClaim }}{{- else }}{{ template "prometheus.alertmanager.fullname" . }}{{- end }}
        {{- else }}
          emptyDir: {}
        {{- end -}}
{{- end }}
{{- end }}
