nf:
  version: "23.3.1-p5"
  vendorId: "mvnr"
  mtcilId: "mtcil1" #do not edit
  nfClass: "mgmt"
  nfType: "mtcil"
  nfId: "mtcil1"
  cnftpl_configmap:
    mgmt_cfg:
      create: false
      metaspec:
        annotations:
          configMgmt: enabled
    static_cfg:
      create: true
      metaspec: {}
    env_cfg:
      create: false
      metaspec: {}
  cnftpl_secret:
      create: false
      metaspec: {}
      secretspec: {}
  cnftpl_namespaces:
      create: false
      metaspec: {}
  cnftpl_dashboard:
      create: false
      metaspec: {}
  cnftpl_eventdef:
      create: true
      metaspec: {}
  cnftpl_alertsdef:
      create: false
      metaspec: {}
  cnftpl_metricsdef:
      create: false
      metaspec: {}

mmaas-controller:
  mmaas_enabled: false
  mtcil_prometheus: disable
  mtcil_metric_storage: disable
  server_configmap: mtcil-prometheus-server
  mtcil_metric_storage: disable
  mtcil_scrape_level: nf
  prometheus_operator: enable
  operator_namespace: mointoring
  scrape_namespace: "any"
  non_clock_aligned_port_names: "metrics"
  clock_aligned_port_names: "metrics"

m3db:
  m3dbnode:
    mmaas_enabled: false
    mtcil_prom_enabled: false
  local-volume-provisoner:
    mtcil_prom_enabled:  false
prometheus:
  server:
    enabled: false
    statefulSet:
      enabled: true
    persistentVolume:
      enabled: true
    retention: "1d"
    service:
      servicePort: 9090
      type: NodePort
    resources:
      limits:
        cpu: 1500m
        memory: 3500Mi
      requests:
        cpu: 750m
        memory: 2500Mi
    nodeSelector:
      mgmt: "true"        
  pushgateway:
    enabled: false
    persistentVolume:
      enabled: false
  alertmanager:
    enabled: false
    persistentVolume:
      enabled: false
    resources:
      limits:
        cpu: 100m
        memory: 200Mi
      requests:
        cpu: 50m
        memory: 100Mi
    nodeSelector:
      mgmt: "true"         
  configmapReload:
    prometheus:
      resources:
        limits:
          cpu: 100m
          memory: 200Mi
        requests:
          cpu: 50m
          memory: 100Mi
    alertmanager:
      resources:
        limits:
          cpu: 100m
          memory: 200Mi
        requests:
          cpu: 50m
          memory: 100Mi
  nodeExporter:
    enabled: false
    resources:
      limits:
        cpu: 500m
        memory: 500Mi
      requests:
        cpu: 250m
        memory: 250Mi
  forceNamespace: mvnr-mtcil1-mgmt-mtcil-mtcil1
config-service:
  mgmt_version: "23.3.1-p5"  
alerts:
   diskspace: 70
   cpu: 80
   memory: 80

mtcilIngress:
#servicePrefixRN true|false, this will prefix release name to service, thr are few usecases like prometheus 
  L7Ingress:
    mtcil-fmaas:
      enable: true
      entryPoint: "web"
      servicePrefixRN: false
      prefix: "/api/v1/fmaas"
      service: fault-service
      port: 12090
    mtcil-tmaas:
      enable: true
      entryPoint: "web" 
      servicePrefixRN: false
      prefix: "/api/v1/tmaas`,`/api/mtcil/v1"
      service: topo-engine
      port: 8080
  L4TCPIngress:
    mtcil-netconf: 
      enable: true 
      entryPoint: mtcil-netconf
      servicePrefixRN: false
      service: config-service
      port: 12090
    limaas: 
      enable: true
      entryPoint: limaas
      servicePrefixRN: false
      service: li-manager
      port: 9090
    prometheus:
      enable: true 
      entryPoint: prometheus  
      servicePrefixRN: true
      service: prometheus-server
      port: 9090
