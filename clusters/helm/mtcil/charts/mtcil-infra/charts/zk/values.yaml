nf:
  version: "v3.8.3"
  vendorId: "mvnr"
  mtcilId: "mtcil1" #do not edit
  nfClass: "infra"
  nfType: "mtcil"
  nfId: "mtcil1"

  cnftpl_configmap:
    mgmt_cfg:
      create: false
      metaspec:
        annotations:
          configMgmt: enabled
    static_cfg:
      create: false
      metaspec: {}
    env_cfg:
      create: false
      metaspec: {}
  cnftpl_secret:
      create: false
      metaspec: {}
      secretspec: {}
  cnftpl_namespaces:
      create: false
      metaspec: {}
  cnftpl_dashboard:
      create: false
      metaspec: {}
  cnftpl_eventdef:
      create: false
      metaspec: {}
  cnftpl_alertsdef:
      create: false
      metaspec: {}
  cnftpl_metricsdef:
      create: false
      metaspec: {}

app_name_prefix: ""
#namespace: mvnr-cnf-infra
hub: 10.1.1.1:5000

componentSpec:
  deployment:
    pod_metaspec:
      labels:
        app: zk

  service:
    metaspec:
      labels:
        app: zk

common:
  app_name: zk

service:
  svc_type: ClusterIP
  ports:
    client: 2181
    server: 2888
    leader_election: 3888
    http: 80
     
container:
  replica_count: 1
  image:
    hub: 10.1.34.114:5000
    repository: zk
    tag: v3.8.3
  config:  
    ZK_HEAP_SIZE: 256M
    ZK_DATA_DIR: "/zk"
    ZK_DATA_LOG_DIR: "/zk"
    ZK_SNAPSHOT_EMPTY: "True"
    ZK_SNAP_RETAIN_COUNT: "3"
    ZK_PURGE_INTERVAL: "1"
  resource:
    limit_memory: 500Mi
    limit_cpu: 500m
    requests_memory: 125Mi
    requests_cpu: 125m
  ports:  
    client: 2181
    server: 2888
    leader_election: 3888
  readiness_config:
    exec_command: zkOk.sh
    initialDelaySeconds: 30
    timeoutSeconds: 5
  liveness_config:
    exec_command: zkOk.sh
    initialDelaySeconds: 30
    timeoutSeconds: 5 

podConfig:

volumeClaimMetadata:

volume:
  name: zk-pv
  pathprefix: mtcil-volumes/zk-pv
  pvenabled: true
  storageClaim: 3Gi
  storageCapacity: 3Gi
  accessModes: "ReadWriteOnce"
  reclaimPolicy: "Delete"
  storageClassName: ""

affinity:
  nodeAffinity: {}
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
    - weight: 100
      podAffinityTerm:
        labelSelector:
          matchExpressions:
          - key: component
            operator: In
            values:
            - "zk"
        topologyKey: kubernetes.io/hostname
