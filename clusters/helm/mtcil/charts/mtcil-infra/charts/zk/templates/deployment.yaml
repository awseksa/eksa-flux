{{- if and .Values.global.mtcil.enableServiceprovisioning .Values.global.mtcil.enableMandatoryServices }}
{{- if .Values.global.mtcil.infra_deploy -}}
{{- $cnfHdr := (dict "" "") -}}
{{- include "cnfTplHeader_2_27" (dict "cnfHdr" $cnfHdr "dot" . ) -}}
{{- if and (.Values.volume.storageClassName) ( .Values.global.mtcil.storage.isProviderMTCIL) }}
{{- fail "Microservice Level StorageClass provisioning is not possible when mtcil provided local storageClass is enabled. Kindly Use local storage for all stateful pv or use cloud storage to override pv provision at microservice level." }} 
{{- end }}
apiVersion: apps/v1
kind: StatefulSet
{{- if .Values.app_name_prefix }}
{{- include "cnfTplMetadata_2_27" (dict "setOffset" "0" "cnfHdr" $cnfHdr "metadata" (dict "name" .Values.app_name_prefix)) }}
{{- else }}
{{- include "cnfTplMetadata_2_27" (dict "setOffset" "0" "cnfHdr" $cnfHdr "metadata" "") }}
{{- end }}
spec:
  serviceName: {{ .Values.common.app_name }}
  replicas: {{ .Values.container.replica_count }}
  selector:
    matchLabels:
      app: {{ .Values.common.app_name }}
  template:
    {{- if .Values.app_name_prefix }}
    {{- include "cnfTplMetadata_2_27" (merge (dict "setOffset" "4" "cnfHdr" $cnfHdr "metadata" .Values.componentSpec.deployment.pod_metaspec) (dict "setOffset" "0" "cnfHdr" $cnfHdr "metadata" (dict "name" .Values.app_name_prefix))) }}
    {{- else }}
    {{- include "cnfTplMetadata_2_27" (dict "setOffset" "4" "cnfHdr" $cnfHdr "metadata" .Values.componentSpec.deployment.pod_metaspec) }}
    {{- end }}
    spec:
      {{- if .Values.global.mtcil.use_release_ns }}
      serviceAccountName: mtcil-sa
      automountServiceAccountToken: false
      {{- end }}
      containers:
      - name: {{ .Values.common.app_name }}
        {{- if and (.Values.global) (.Values.global.hub) }}
        image: {{ .Values.global.hub }}/{{ .Values.container.image.repository }}:{{ .Values.container.image.tag }}
        {{- else }}
        image: {{ .Values.container.image.hub }}/{{ .Values.container.image.repository }}:{{ .Values.container.image.tag }}
        {{- end }}
        imagePullPolicy: {{ .Values.global.mtcil.imagePullPolicy }}
{{- if  .Values.containerConfig }}
{{ toYaml .Values.containerConfig | indent 8 }}
{{- else if .Values.global.mtcil.containerConfig }}
{{ toYaml .Values.global.mtcil.containerConfig | indent 8 }}
{{- end }}
        lifecycle:
          preStop:
            exec:
              command:
              - /bin/bash
              - -c
              - echo 'preStop_executed start time:' > /proc/1/fd/1;date > /proc/1/fd/1;sleep 30;echo 'preStop_executed end time:' > /proc/1/fd/1;date > /proc/1/fd/1;sleep 1
        env:
        - name: K8S_POD_ID
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: K8S_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: CLUSTER_DOMAIN
          value: {{ .Values.global.mtcil.clusterDomain }}
        - name: ZK_REPLICAS
          value: {{ .Values.container.replica_count | quote }}
        - name: ZK_HEAP_SIZE
          value: {{ .Values.container.config.ZK_HEAP_SIZE | quote }}
        - name: ZK_SNAPSHOT_EMPTY
          value: {{ .Values.container.config.ZK_SNAPSHOT_EMPTY | quote }}
        - name: ZK_SNAP_RETAIN_COUNT
          value: {{ .Values.container.config.ZK_SNAP_RETAIN_COUNT | quote }}
        - name: ZK_PURGE_INTERVAL
          value: {{ .Values.container.config.ZK_PURGE_INTERVAL | quote }}
        - name: TZ
          value: {{ .Values.global.timezone | quote }}
{{- if .Values.volume.pvenabled }}
        - name: ZK_DATA_DIR
          value: {{ .Values.container.config.ZK_DATA_DIR | quote }}
        - name: ZK_DATA_LOG_DIR
          value: {{ .Values.container.config.ZK_DATA_LOG_DIR | quote }}
{{- end }}
        resources:
          limits:
            cpu: {{ .Values.container.resource.limit_cpu }}
            memory: {{ .Values.container.resource.limit_memory }}
          requests:
            cpu: {{ .Values.container.resource.requests_cpu }}
            memory: {{ .Values.container.resource.requests_memory }}
        ports:
        - containerPort: {{ .Values.container.ports.client }}
          name: clientport
        - containerPort: {{ .Values.container.ports.server }}
          name: server
        - containerPort: {{ .Values.container.ports.leader_election }}
          name: leader-election
        readinessProbe:
          exec:
            command:
            - {{ .Values.container.readiness_config.exec_command | quote }}
          initialDelaySeconds: {{ .Values.container.readiness_config.initialDelaySeconds }}
          timeoutSeconds: {{ .Values.container.readiness_config.timeoutSeconds }}
        livenessProbe:
          exec:
            command:
            - {{ .Values.container.liveness_config.exec_command | quote }}
          initialDelaySeconds: {{ .Values.container.liveness_config.initialDelaySeconds }}
          timeoutSeconds: {{ .Values.container.liveness_config.timeoutSeconds }}
{{- if .Values.volume.pvenabled }}
        volumeMounts:
        - name: zk-vol
          mountPath: /zk
{{- end }}
      terminationGracePeriodSeconds: 60
{{- if and (.Values.global) (.Values.global.mtcil) (.Values.global.mtcil.infraNodeSelector) (.Values.global.mtcil.infraNodeSelector.enabled) }}
      nodeSelector:
        {{ .Values.global.mtcil.infraNodeSelector.labelKey }}: {{ .Values.global.mtcil.infraNodeSelector.labelValue | quote }}
{{- end }}
{{- if  .Values.podConfig }}
{{ toYaml .Values.podConfig | indent 6 }}
{{- end }}
{{- if .Values.global.mtcil.podConfig }}
{{ toYaml .Values.global.mtcil.podConfig | indent 6 }}
{{- end }}

{{- if  .Values.affinity }}
      affinity:
{{ toYaml .Values.affinity | indent 8 }}
{{- end }}

{{- if .Values.volume.pvenabled }}
  volumeClaimTemplates:
  - metadata:
      name: zk-vol
{{- if  .Values.volumeClaimMetadata }}
{{ toYaml .Values.volumeClaimMetadata | indent 6 }}
{{- else if .Values.global.mtcil.volumeClaimMetadata }}
{{ toYaml .Values.global.mtcil.volumeClaimMetadata | indent 6 }}
{{- end }}
    spec:
      accessModes: [ {{ .Values.volume.accessModes }} ]
      {{- if .Values.volume.storageClassName }}
      storageClassName: {{ .Values.volume.storageClassName }}
      {{- else }}
      storageClassName: {{ .Values.global.mtcil.storage.storageClass }}
      {{- end }}
      resources:
        requests:
          storage: {{ .Values.volume.storageClaim }}
{{- if and (.Values.global) (.Values.global.mtcil) (.Values.global.mtcil.storage) (not .Values.volume.storageClassName) (.Values.global.mtcil.storage.isProviderMTCIL) }}
      selector:
        matchLabels:
          zk-vol: "true"
{{- end }}
{{- end }}
{{- end }}
{{- end }}
