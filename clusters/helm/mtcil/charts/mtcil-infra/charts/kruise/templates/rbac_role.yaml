    app.kubernetes.io/instance: {{ .Release.Name }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ template "kruise.fullname" . }}-manager-role1
subjects:
  - kind: ServiceAccount
    name: kruise-default
    namespace: {{ template "kruise.namespace" . }}
---

