{{- if ( and (.Values.global.mtcil.optionalDeployment.kruise) (.Values.global.mtcil.enableRBACprovisioning)) }}
{{- if .Values.enabled -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ template "kruise.fullname" . }}-leader-election-role
  labels:
    app.kubernetes.io/name: {{ template "kruise.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
  namespace: {{ template "kruise.namespace" . }}
rules:
- apiGroups:
  - ""
  resources:
  - configmaps
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
- apiGroups:
  - ""
  resources:
  - configmaps/status
  verbs:
  - get
  - update
  - patch
- apiGroups:
  - ""
  resources:
  - events
  verbs:
  - create
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ template "kruise.fullname" . }}-leader-election-rolebinding
  labels:
    app.kubernetes.io/name: {{ template "kruise.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
  namespace: {{ template "kruise.namespace" . }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ template "kruise.fullname" . }}-leader-election-role
subjects:
  - kind: ServiceAccount
    name: kruise-default
    namespace: {{ template "kruise.namespace" . }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  creationTimestamp: null
  name: {{ template "kruise.fullname" . }}-manager-role1
  labels:
    app.kubernetes.io/name: {{ template "kruise.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
rules:
- apiGroups: ["admissionregistration.k8s.io"]
  resources: ["mutatingwebhookconfigurations", "validatingwebhookconfigurations"]
  verbs: ["get", "list", "patch", "update", "watch"]
- apiGroups: ["apiextensions.k8s.io"]
  resources: ["customresourcedefinitions"]
  verbs: ["get", "list", "patch", "update", "watch"]
{{- /* Commented RBAC - FOR FUTURE USE
- apiGroups: ["apps.kruise.io"]
  resources: ["sidecarsets"]
  verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]
- apiGroups: ["apps.kruise.io"]
  resources: ["sidecarsets/status"]
  verbs: ["get", "patch", "update"]
*/}}

