{{- if ( and (.Values.global.mtcil.optionalDeployment.kruise) (.Values.global.mtcil.enableServiceprovisioning)) }}
{{- if .Values.enabled -}}
apiVersion: v1
kind: Service
metadata:
  name: kruise-webhook-service
  labels:
    app.kubernetes.io/name: {{ template "kruise.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
  {{- $custom_extensions := .Values.global.custom_extensions | default dict -}}
  {{- if $custom_extensions.labels -}}
  {{- range $key, $value := .Values.global.custom_extensions.labels }}
    {{ $key }}: {{ $value | quote }}
  {{- end }}
  {{- end }}
  {{- if $custom_extensions.annotations }}
  annotations:
  {{- range $key, $value := .Values.global.custom_extensions.annotations }}
    {{ $key }}: {{ $value | quote }}
  {{- end }}
  {{- end }}
  namespace: {{ template "kruise.namespace" . }}
spec:
  ports:
    - port: 443
      targetPort: {{ .Values.manager.webhook.port }}
  selector:
    control-plane: controller-manager
---
apiVersion: v1
kind: Secret
metadata:
  name: kruise-webhook-certs
  labels:
    app.kubernetes.io/name: {{ template "kruise.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
  namespace: {{ template "kruise.namespace" . }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kruise-default
  labels:
    app.kubernetes.io/name: {{ template "kruise.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
  namespace: {{ template "kruise.namespace" . }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/name: {{ template "kruise.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    {{ template "kruise.metadata.mtcillabels" (dict "specOffset" 4 "dot" .) }}
    {{- $custom_extensions := .Values.global.custom_extensions | default dict -}}
    {{- $pod_metaspec := .Values.componentSpec | default dict -}}
    {{- if $custom_extensions.labels -}}
    {{- range $key, $value := .Values.global.custom_extensions.labels }}
    {{ $key }}: {{ $value | quote }}
    {{- end }}
    {{- end }}
    control-plane: controller-manager
  {{- if .Values.app_name_prefix }}
  name: {{ .Values.app_name_prefix }}
  {{- else }}
  name: {{ template "kruise.fullname" . }}-controller-manager
  {{- end }}
  namespace: {{ template "kruise.namespace" . }}
  annotations:
    {{ template "kruise.metadata.mtcilannotations" (dict "specOffset" 4 "dot" .) }}
    {{- if $custom_extensions.annotations -}}
    {{- range $key, $value := .Values.global.custom_extensions.annotations }}
    {{ $key }}: {{ $value | quote }}
    {{- end }}
    {{- end }}
spec:
  replicas: {{ .Values.manager.replicas }}
  selector:
    matchLabels:
      control-plane: controller-manager
  minReadySeconds: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 100%
  template:
    metadata:
      namespace: {{ template "kruise.namespace" . }}
      annotations:
        {{ template "kruise.metadata.mtcilannotations" (dict "specOffset" 8 "dot" .) }}
        {{- if $custom_extensions.annotations -}}
        {{- range $key, $value := .Values.global.custom_extensions.annotations }}
        {{ $key }}: {{ $value | quote }}
        {{- end }}
        {{- end }}
      labels:
        {{ template "kruise.metadata.mtcillabels" (dict "specOffset" 8 "dot" .) }}
        {{- if $custom_extensions.labels -}}
        {{- range $key, $value := .Values.global.custom_extensions.labels }}
        {{ $key }}: {{ $value | quote }}
        {{- end }}
        {{- end }}
        {{- if $pod_metaspec.deployment -}}
        {{- range $key, $value := .Values.componentSpec.deployment.pod_metaspec.labels }}
        {{ $key }}: {{ $value | quote }}
        {{- end }}
        {{- end }}
        control-plane: controller-manager
    spec:
      serviceAccountName: kruise-default
      containers:
        - args:
            - --enable-leader-election
            - --metrics-addr={{ .Values.manager.metrics.addr }}:{{ .Values.manager.metrics.port }}
            - --health-probe-addr=:{{ .Values.manager.healthProbe.port }}
            - --logtostderr=true
            - --leader-election-namespace={{ template "kruise.namespace" . }}
            - --v={{ .Values.manager.log.level }}
            - --feature-gates={{ .Values.featureGates }}
            {{- if (and (.Values.global.mtcil.scope.namespaced) ( not .Values.global.mtcil.scope.namespaceList)) }}
            - --namespace={{ template "kruise.namespace" . }}
            {{- end }}
          command:
            - /manager
          {{- if and (.Values.global) (.Values.global.hub) }}
          image: {{ .Values.global.hub }}/{{ .Values.manager.image.repository }}:{{ .Values.manager.image.tag }}
          {{- else }}
          image: {{ .Values.manager.image.repository }}:{{ .Values.manager.image.tag }}
          {{- end }}
          imagePullPolicy: {{ .Values.global.mtcil.imagePullPolicy }}
{{- if  .Values.containerConfig }}
{{ toYaml .Values.containerConfig | indent 10 }}
{{- else if .Values.global.mtcil.containerConfig }}
{{ toYaml .Values.global.mtcil.containerConfig | indent 10 }}
{{- end }}
          name: manager
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: WEBHOOK_PORT
              value: "{{ .Values.manager.webhook.port }}"
            - name: WEBHOOK_CONFIGURATION_FAILURE_POLICY_PODS
              value: {{ .Values.webhookConfiguration.failurePolicy.pods }}
            - name: MUTATING_WEBHOOK_CONFIG_NAME
              value: {{ printf "%s-mutating-webhook-configuration" ( include "kruise.fullname" . ) | quote }}
            - name: VALIDATING_WEBHOOK_CONFIG_NAME
              value: {{ printf "%s-validating-webhook-configuration" ( include "kruise.fullname" . ) | quote }}
          ports:
            - containerPort: {{ .Values.manager.webhook.port }}
              name: webhook-server
              protocol: TCP
            - containerPort: {{ .Values.manager.metrics.port }}
              name: metrics
              protocol: TCP
            - containerPort: {{ .Values.manager.healthProbe.port }}
              name: health
              protocol: TCP
          readinessProbe:
            httpGet:
              path: readyz
              port: {{ .Values.manager.healthProbe.port }}
          resources:
            {{- toYaml .Values.manager.resources | nindent 12 }}
      terminationGracePeriodSeconds: 10
      {{- if and (.Values.global) (.Values.global.mtcil) (.Values.global.mtcil.infraNodeSelector) (.Values.global.mtcil.infraNodeSelector.enabled) }}
      nodeSelector:
        {{ .Values.global.mtcil.infraNodeSelector.labelKey }}: {{ .Values.global.mtcil.infraNodeSelector.labelValue | quote }}
      {{- end }}
{{- if .Values.manager.tolerations }}
      tolerations:
{{ toYaml .Values.manager.tolerations | indent 8 }}
{{- end }}
{{- if  .Values.podConfig }}
{{ toYaml .Values.podConfig | indent 6 }}
{{- end }}
{{- if .Values.global.mtcil.podConfig }}
{{ toYaml .Values.global.mtcil.podConfig | indent 6 }}
{{- end }}

{{- if  .Values.affinity }}
      affinity:
{{ toYaml .Values.affinity | indent 8 }}
{{- end }}
{{- end }}
{{- end }}