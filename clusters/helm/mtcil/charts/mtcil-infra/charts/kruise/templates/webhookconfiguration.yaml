{{- if ( and (.Values.global.mtcil.optionalDeployment.kruise) (.Values.global.mtcil.enableWebhookprovisioning)) }}
{{- if .Values.enabled -}}
apiVersion: admissionregistration.k8s.io/v1beta1
kind: MutatingWebhookConfiguration
metadata:
  creationTimestamp: null
  name: {{ template "kruise.fullname" . }}-mutating-webhook-configuration
  labels:
    app.kubernetes.io/name: {{ template "kruise.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
  annotations:
    template: ""
webhooks:
- clientConfig:
    caBundle: Cg==
    service:
      name: kruise-webhook-service
      namespace: {{ template "kruise.namespace" . }}
      path: /mutate-apps-kruise-io-v1alpha1-cloneset
  failurePolicy: {{ .Values.webhookConfiguration.failurePolicy.clonesets }}
  timeoutSeconds: {{ .Values.webhookConfiguration.timeoutSeconds }}
  name: mcloneset.kb.io
  rules:
  - apiGroups:
    - apps.kruise.io
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    resources:
    - clonesets
  {{- if .Values.global.mtcil.scope.namespaced }}
    #scope: "Namespaced"
  namespaceSelector:
    matchLabels:
      {{- if and .Values.global.nf .Values.global.nf.nfId }}
      mtcilMOID: {{ .Values.global.nf.nfId }}
      {{- else }}
      mtcilMOID: {{ .Values.nf.nfId }}
      {{- end }}
  {{- end }}
{{- /* Commented - For Future Use 
- clientConfig:
    caBundle: Cg==
    service:
      name: kruise-webhook-service
      namespace: {{ template "kruise.namespace" . }}
      path: /mutate-pod
  failurePolicy: {{ .Values.webhookConfiguration.failurePolicy.pods }}
  timeoutSeconds: {{ .Values.webhookConfiguration.timeoutSeconds }}
  name: mpod.kb.io
  rules:
  - apiGroups:
    - ""
    apiVersions:
    - v1
    operations:
    - CREATE
    resources:
    - pods
- clientConfig:
    caBundle: Cg==
    service:
      name: kruise-webhook-service
      namespace: {{ template "kruise.namespace" . }}
      path: /mutate-apps-kruise-io-v1alpha1-sidecarset
  failurePolicy: {{ .Values.webhookConfiguration.failurePolicy.sidecarsets }}
  timeoutSeconds: {{ .Values.webhookConfiguration.timeoutSeconds }}
  name: msidecarset.kb.io
  rules:
  - apiGroups:
    - apps.kruise.io
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    resources:
    - sidecarsets
*/}}

