    resources: ["certificates/status", "certificaterequests/status", "issuers/status", "certificates/finalizers", "certificaterequests/finalizers", "issuers/finalizers"]
    verbs: ["update"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch", "create", "update", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
