{{- if ( and (.Values.global.mtcil.optionalDeployment.traefik) (.Values.global.mtcil.enableServiceprovisioning)) }}
{{- if and .Values.enabled (.Values.experimental.kubernetesGateway.enabled) -}}
---
kind: GatewayClass
apiVersion: networking.x-k8s.io/v1alpha1
metadata:
  name: traefik
  namespace: {{ template "traefik.namespace" . }}
spec:
  controller: traefik.io/gateway-controller
{{- end }}
{{- end }}
