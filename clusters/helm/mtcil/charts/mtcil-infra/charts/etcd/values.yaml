nf:
  version: "v3.4.29"
  vendorId: "mvnr"
  mtcilId: "mtcil1" #do not edit
  nfClass: "infra"
  nfType: "mtcil"
  nfId: "mtcil1"

  cnftpl_configmap:
    mgmt_cfg:
      create: false
      metaspec: 
        annotations:
          configMgmt: enabled
    static_cfg: 
      create: true
      metaspec: {}
    env_cfg:
      create: false
      metaspec: {}
  cnftpl_secret:
      create: false
      metaspec: {}
      secretspec: {}
  cnftpl_namespaces:
      create: false
      metaspec: {}
  cnftpl_dashboard:
      create: false
      metaspec: {}
  cnftpl_eventdef:
      create: false
      metaspec: {}
  cnftpl_alertsdef:
      create: false
      metaspec: {}
  cnftpl_metricsdef:
      create: false
      metaspec: {}

app_name_prefix: ""

#namespace: mvnr-cnf-infra
hub: public.ecr.aws/a6u6k4n0
common:
  app_name: etcd

componentSpec:
  deployment:
    pod_metaspec:
      labels:
        app: etcd
      annotations:
        prometheus.io/path: /metrics
        prometheus.io/scrape: "true"
        prometheus.io/port: "2379"

  service: 
    metaspec:
      labels:
        app: etcd

service:
  svc_type: ClusterIP
  headless_svc: true
  ports:
    client: 2379
    server: 2380
    http: 80
     
container:
  replica_count: 1
  image:
    hub: public.ecr.aws/a6u6k4n0
    repository: etcd
    tag: v3.4.29
  config:
    ETCD_RUN_COMMAND: "/bin/startETCD.sh" 
    #ETCD_INITIAL_CLUSTER: etcd-0=http://etcd-0.etcd.__ETCD_NAMESPACE.svc.cluster.local:2380,etcd-1=http://etcd-1.etcd.__ETCD_NAMESPACE.svc.cluster.local:2380,etcd-2=http://etcd-2.etcd.__ETCD_NAMESPACE.svc.cluster.local:2380
    ETCD_ENABLE_DEFRAG: false
    ETCD_DEFRAG_INTERVAL: "0 0 * * *" #minute (0 - 59) / hour (0 - 23) / day of the month (1 - 31) / month (1 - 12) / day of the week (0 - 6) 
  resource:
    limit_memory: 1000Mi
    limit_cpu: 1000m
    requests_memory: 1000Mi
    requests_cpu: 1000m
  ports:  
    client: 2379
    server: 2380

volume:
  name: etcd-pv
  pathprefix: mtcil-volumes/etcd-pv 
  pvenabled: true
  storageClaim: 2Gi
  storageCapacity: 2Gi 
  accessModes: "ReadWriteOnce"
  reclaimPolicy: "Delete"
  storageClassName: ""

podConfig:

volumeClaimMetadata:

affinity:
  nodeAffinity: {}
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
    - weight: 100
      podAffinityTerm:
        labelSelector:
          matchExpressions:
          - key: component
            operator: In
            values:
            - "etcd"
        topologyKey: kubernetes.io/hostname
