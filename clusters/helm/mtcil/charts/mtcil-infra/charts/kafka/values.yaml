nf:
  version: "v3.6.1"
  vendorId: "mvnr"
  mtcilId: "mtcil1" #do not edit
  nfClass: "infra"
  nfType: "mtcil"
  nfId: "mtcil1"

  cnftpl_configmap:
    mgmt_cfg:
      create: false
      metaspec:
        annotations:
          configMgmt: enabled
    static_cfg:
      create: false
      metaspec: {}
    env_cfg:
      create: false
      metaspec: {}
  cnftpl_secret:
      create: false
      metaspec: {}
      secretspec: {}
  cnftpl_namespaces:
      create: false
      metaspec: {}
  cnftpl_dashboard:
      create: false
      metaspec: {}
  cnftpl_eventdef:
      create: false
      metaspec: {}
  cnftpl_alertsdef:
      create: false
      metaspec: {}
  cnftpl_metricsdef:
      create: false
      metaspec: {}

app_name_prefix: ""
zk_app_name_prefix: ""

namespace: "mvnr-mtcilx-infra-mtcil-mtcilx"
hub: public.ecr.aws/a6u6k4n0

componentSpec:
  deployment:
    pod_metaspec:
      labels:
        app: kafka

  service:
    metaspec:
      labels:
        app: kafka

common:
  app_name: kafka
  svc_app_name: svc-discovery

service:
  svc_type: ClusterIP
  ports:
    broker: 9092
    http: 80

initContainers:
  image:
    repository: mtcil-svc-init
    tag: 21.2.2

container:
  replica_count: 1
  zk_endpoint_count: 1
  image:
    hub: public.ecr.aws/a6u6k4n0
    repository: kafka
    tag: v3.6.1
  config: 
    HOSTNAME_COMMAND: hostname
    KAFKA_BROKER_ID: hostname | awk -F- '{print $NF}'
    BROKER_ID_COMMAND: hostname | awk -F- '{print $NF}'
    KAFKA_ZOOKEEPER_CONNECTION_TIMEOUT_MS: 300000
    KAFKA_ZOOKEEPER_SESSION_TIMEOUT_MS: 300000
    KAFKA_LISTENERS: PLAINTEXT://:9092
    KAFKA_HEAP_OPTS: -Xmx512M -Xms512M
    KAFKA_LOG_SEGMENT_BYTES: "209715200"
    KAFKA_CREATE_TOPICS: "EVENT:5:3:259200000:-1,TMAAS:5:3:86400000:-1,FMAASEVENTS:5:3:259200000:-1,TRL:5:3:10800000:-1,SLT:5:3:10800000:-1,CONFIG:5:3:10800000:-1,LOGS:10:3:10800000:-1,AVRO:1:3:10800000:-1,CHFCC:10:3:10800000:-1,CGFLOAD:10:3:10800000:-1,CGFAGG:10:3:10800000:-1"
  resource:
    limit_memory: 2000Mi
    limit_cpu: 1000m
    requests_memory: 128Mi
    requests_cpu: 128m
  ports:  
    broker: 9092

podConfig:

volumeClaimMetadata:

volume:
  name: kafka-pv
  pathprefix: mtcil-volumes/kafka-pv
  pvenabled: true
  storageClaim: 6Gi
  storageCapacity: 6Gi
  accessModes: "ReadWriteOnce"
  reclaimPolicy: "Delete"
  storageClassName: ""

affinity:
  nodeAffinity: {}
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
    - weight: 100
      podAffinityTerm:
        labelSelector:
          matchExpressions:
          - key: component
            operator: In
            values:
            - "kafka"
        topologyKey: kubernetes.io/hostname
