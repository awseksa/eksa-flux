global:
  __ClusterExtIP: 10.69.201.157                                                #Please Update the Cluster Master node IP
  hub: public.ecr.aws/a6u6k4n0
  #timezone: "UTC"
  dnPrefix: mvnr-aws-du
  nf:
    nfId: mtcil
    mtcilId: mtcil1
  mtcil:
    #volumeClaimMetadata:
    #  annotations:
    #    robin.io/replication: "3"
    #    robin.io/faultdomain: "host"
    #    robin.io/runAsAny: "true"

    #clusterDomain: paco-cp.cluster.maz             #Only Update if you need the Custom Domain Feature

    #enableMgmtConfigmapProvisioning: false         #only in case of gitops mode we need this flag

    #enablePodmonitorProvisioning: false       #Please comment it out and use mmaas:true before 22.3.x , if this flag is enabled mmaas should be false.

    #includeFQDNHB: "true"    #MTCIL will send CMaaS and FMaaS service FQDN in the heartbeat. Only in mtcil and cms in same cluster.
    
    k8s_nf_labels: "SiteId,NfName,cnfc_uuid"       #Cutomer Specific-If Kubernetes Labels in VES Events please uncomment below entry.

    cim:
      imageTag: 23.3.1-p5                             #Please Update the image tag based on the patch
      host_path: /data/logs
      #mount_type: DirectoryOrCreate

    svcInit:
      imageTag: 23.3.1-p2                             #Please Update the image tag based on the patch

    #event_label_tmaas_prefix: "mtcil.com/tmaas."
    #event_labels_to_be_prefixed: "nfName,nfServiceName,nfServiceInstanceName"

    imagePullSecrets: artifactory-secret-mtcil       #Update the secret name accordingly
    imagePullPolicy: IfNotPresent     #IfNotPresent/Always
    
    helmTest:
      enable: false

    podConfig:
      dnsConfig:
        options:
          - name: ndots
            value: "2"

    #tolerations:
    #- key: "node.kubernetes.io/unreachable"
    #  operator: "Exists"
    #  effect: "NoExecute"
    #  tolerationSeconds: 10
    #- key: "node.kubernetes.io/unreachable"
    #  operator: "Exists"
    #  effect: "NoExecute"
    #  tolerationSeconds: 10
        
    use_release_ns: true
    create_ns: false
    infra_deploy: true
    infraNodeSelector:
      enabled: true
      labelKey: infra
      labelValue: "true"
    mgmtNodeSelector:
      enabled: true
      labelKey: mgmt
      labelValue: "true"
    kafka_svc_fqdn: "kafka-svc.mtcil.svc.cluster.local:9092"
    etcd_svc_fqdn: "etcd.mtcil.svc.cluster.local:2379"
    zk_svc_fqdn: "zk-0.zk.mtcil.svc.cluster.local:2181"
      #zk_svc_fqdn: "zk-0.zk.mtcil.svc.cluster.local:2181,zk-1.zk.mtcil.svc.cluster.local:2181,zk-2.zk.mtcil.svc.cluster.local:2181"

    #NOTE Only If your mtcil namespace is started with number like below namespace(5gc-mtcil), comment the above fqdn section and below section(fqdn) can be enabled and use it
    #kafka_svc_fqdn: 'kafka-svc.5gc-mtcil.svc.cluster.local:9092'    #Update the name of your namespace in place of 5gc-mtcil 
    #etcd_svc_fqdn: 'etcd.5gc-mtcil.svc.cluster.local:2379'          #Update the name of your namespace in place of 5gc-mtcil
    #zk_svc_fqdn: 'zk.5gc-mtcil.svc.cluster.local:2181'              #Update the name of your namespace in place of 5gc-mtcil

    config_mode: netconf                     # Option are netconf/gitops/mixed
    limaasEnabled: false

    #logging_mode: STDOUT                     #Update the Logging Mode
    #log_format: "unified-json"                #set values as text/json/unified-json when STDOUT is enabeld.
    #logging_stdout_local: true               #Update the Logging local when STDOUT is enabeld.




    storage_engine: zookeeper
    storage:
      storageClass: prometheus-pv
      isProviderMTCIL: false
      mtcilIdPrefixed: false
      mtcilLocalStorageHostPathPrefix: /data
#      hostlocalVolumeSelector:
#        - worker1
#        - worker2
#        - worker3



