    #    - IPv4
    #    - IPv6
    
    #securityPolicy:
      #type: "scc"
      #name: "restricted-cat-1"  #restricted-cat-1/privileged(privileged only in case of host access is available)

    #podConfig:
      #securityContext:
        #fsGroup: 1000880000  
 
    #containerConfig:
      #securityContext:
        #allowPrivilegeEscalation: false            #if securityPolicy is privileged then make it true
        #capabilities:
          #drop:
            #- all
        #privileged: false          #if securityPolicy is privileged then make it true
        #runAsNonRoot: true
        #runAsUser: 1000880000
        #runAsGroup: 1000880000 


        
##RBAC Mode
    enableRBACprovisioning: true
    scope:
      namespaced: false
      namespaceList:                               #Update the name of your namespaces under namespace list
        - mtcil
      enableNamespaceListRBAC: false
      enablePriviledgedRBAC: true

##WEBHOOK
    enableWebhookprovisioning: true
    #authManagement:
      #enableAutoInjection: false
      #enableSecretDiscovery: true
      #secretName: mtcil-ca-bundle
      #serverKey: tls.key
      #serverCertificate: tls.crt
      #enableCertificateprovisioning: false
      #mtcilWebhookAnnotations:
      #type: "ocp"  #ocp/certmanager
      #ocpApiPrefix: "service.beta.openshift.io"
      

##Ingress-Controller
    ingress:
      enableLB: false
      lbIngressIP: '172.3.4.5'                #Update the External IP 
      lbL7ingressPort: 80                   #The lbL7ingressPort ingress K8S service HTTP port (FMaaS REST port.).
      lbL7tmaasPort: 3179                   #The lbL7tmaasPort ingress K8S service TCP port (TMAAS REST port).
      lbL7fmaasPort: 3179
      lbL4netconfPort: 3181                 #The lbL4netconfPort ingress K8S service TCP port (CMaaS NETCONF port).
      lbL4limaasPort: 3182
      lbL4prometheusPort: 3183
      lbController: "Traefik"                 #Possible values Traefik/metalLB/istio
      #addressPool: "mtcil-address-pool"     #addressPool indicates the address pool name for metalLB.
      istio:                                #This section is required for istio to put ip based on label.
        ingressTcpPort: 3181
        ingressSelector:
          istio: "ingressgateway"

mtcil-infra:
  etcd:
    #app_name_prefix: "st-mtcil-etcd"
    container:
      replica_count: 1
      #image:
        #tag: 23.x.x_px                                          #Please Update the image tag based on the patch, if none please comment it out
      resource:
        limit_memory: 1000Mi
        limit_cpu: 1000m
        requests_memory: 1000Mi
        requests_cpu: 1000m
    volume:
      storageClaim: 20Gi
      storageCapacity: 20Gi
      
  kafka:
    #app_name_prefix: "st-mtcil-kafka"
    #zk_app_name_prefix: "st-mtcil-zk"
    container:
      replica_count: 1
      #image:
        #tag: v3.4.0                                          #Please Update the image tag based on the patch, if none please comment it out
      resource:
        limit_memory: 2000Mi
        limit_cpu: 1000m
        requests_memory: 2000Mi
        requests_cpu: 1000m
    volume:
      storageClaim: 50Gi
      storageCapacity: 50Gi
  zk:
    #app_name_prefix: "st-mtcil-zk"
    container:
      replica_count: 1
      #image:
        #tag: v3.6.5                                          #Please Update the image tag based on the patch, if none please comment it out
      resource:
        limit_memory: 2000Mi
        limit_cpu: 1000m
        requests_memory: 2000Mi
        requests_cpu: 1000m
    volume:
      storageClaim: 10Gi
      storageCapacity: 10Gi

